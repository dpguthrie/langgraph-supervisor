name: Self-Improving Agent Flywheel

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 0 * * *"  # midnight UTC daily

jobs:
  flywheel:
    uses: dpguthrie/braintrust-flywheel-plugin/.github/workflows/bt-flywheel-claude.yml@main

    with:
      project_name: langgraph-supervisor

      system_context: |
        This is a LangGraph multi-agent supervisor system. A supervisor agent routes user
        queries to two specialized sub-agents:
        - Research Agent: answers questions using Tavily web search
        - Math Agent: performs calculations using add/subtract/multiply/divide tools

        ## Key metrics
        Routing Accuracy, Response Quality, Step Efficiency (Combined Score aggregates all three).

        ## Where things live
        - Eval files: evals/eval_supervisor.py, evals/eval_math_agent.py, evals/eval_research_agent.py
        - Agent prompts and model config: src/config.py
        - Supervisor logic: src/agents/deep_agent.py
        - Scorers: scorers.py

      code_paths: src/ evals/ scorers.py
      act_mode: auto
      base_branch: main

      extra_env: |
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
        BRAINTRUST_GATEWAY_URL=https://gateway.braintrust.dev
        BRAINTRUST_GATEWAY_BASE_URL=https://gateway.braintrust.dev/v1
        BRAINTRUST_CC_PROJECT=langgraph-supervisor-claude-code
        TRACE_TO_BRAINTRUST=true

      setup_python: true
      python_version: "3.12"
      python_install_cmd: uv sync

    secrets: inherit
